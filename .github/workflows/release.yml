name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, closed ]


permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  draft-release-staging:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_FLOW_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_FLOW_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Check release branch
        run: |
          RELEASE=$(git ls-remote --heads origin 'releases/stable/v*' | awk '{print $2}' | sed 's/refs\/heads\///')
          if [ -n "$RELEASE" ]; then
            echo "Release branch \`$RELEASE\` already exists."
            exit 1
          fi
      - name: Draft staging release pull request
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node .github/scripts/release/draft-staging.mjs --apply
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}

  release-staging-comment-decision-template:
    if: github.event.action == 'opened' && startsWith(github.head_ref, 'releases/stable/v')
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            fs.readFile('./CHANGELOG.md', 'utf8', async (err, changelog) => {
              if (err) { return core.setFailed(`Action failed with error ${err}`); };

              changelog = (changelog.match(/^## .+?(?=\n## |\n?$)/ms) || [''])[0].trim();

              let changes = 'ソースコード\n';
              changes += [ ...changelog.matchAll(/\*.+\n/g) ].map(match => `${match[0].slice(0, match[0].lastIndexOf(' ('))}`).filter((v1, index, array) => array.findIndex((v2) => v1 === v2) === index).sort().reverse().join('\n') + '\n';
              changes += `* [Compare](../compare/stable...${process.env.GITHUB_HEAD_REF}) stable...${process.env.GITHUB_HEAD_REF}\n`;

              const day = [ '日', '月', '火', '水', '木', '金', '土' ];
              const date = new Date();
              date.setDate(date.getDate() + (4 - date.getDay() + 7) % 7);
              const qas = `${date.getFullYear()}-${('0' + (date.getMonth() + 1)).slice(-2)}-${('0' + date.getDate()).slice(-2)} (${day[date.getDay()]})`;
              date.setDate(date.getDate() + 7);
              const prd = `${date.getFullYear()}-${('0' + (date.getMonth() + 1)).slice(-2)}-${('0' + date.getDate()).slice(-2)} (${day[date.getDay()]})`;

              fs.readFile('./.github/templates/release-decision.md', 'utf8', async (err, decision) => {
                if (err) { return core.setFailed(`Action failed with error ${err}`); };
                decision = decision.replace('${REPLACE_CHANGE_LIST}', changes);
                decision = decision.replace('${REPLACE_QAS_DATE}', qas);
                decision = decision.replace('${REPLACE_PRD_DATE}', prd);

                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.pull_request.number, body: decision, });
              });
            });
        env:
          TZ: 'Asia/Tokyo'

  release-staging:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.base.ref, 'releases/stable/v') &&
      startsWith(github.event.pull_request.head.ref, 'releases/stable/v') &&
      endsWith(github.event.pull_request.head.ref, '-draft')
    runs-on: ubuntu-slim
    timeout-minutes: 15
    concurrency:
      group: release-staging
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_FLOW_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_FLOW_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Apply staging release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node .github/scripts/release/apply-staging.mjs --apply
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
