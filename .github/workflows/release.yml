name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [ closed ]


permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  draft-release-production:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write        # Required to create and push the release branch
      pull-requests: write   # Required to create the production release pull request
      issues: write          # Required to post comments on pull requests
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_FLOW_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_FLOW_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Check release branch
        run: |
          RELEASE=$(git ls-remote --heads origin 'releases/production/v*' | awk '{print $2}' | sed 's/refs\/heads\///')
          if [ -n "$RELEASE" ]; then
            echo "Release branch \`$RELEASE\` already exists."
            exit 1
          fi
      - name: Draft production release pull request
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node .github/scripts/release/draft-production.mjs --apply
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}

  release-production:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.base.ref, 'releases/production/v') &&
      startsWith(github.event.pull_request.head.ref, 'releases/production/v') &&
      endsWith(github.event.pull_request.head.ref, '-draft')
    runs-on: ubuntu-slim
    timeout-minutes: 15
    concurrency:
      group: release-production
      cancel-in-progress: false
    permissions:
      contents: write        # Required to create and push the production release branch
      pull-requests: write   # Required to create and update the release pull request
      issues: write          # Required to post comments on pull requests
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_FLOW_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_FLOW_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Apply production release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node .github/scripts/release/apply-production.mjs --apply
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
