name: CI/CD Root Directory

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
      - '!wip/**'
    paths:
      - '*'
      - '.github/**'


permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


env:
  NODE_OPTIONS: --max-old-space-size=4096
  matrix-node-versions: 24


jobs:
  init:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=[ $MATRIX_NODE_VERSIONS ]" >> "$GITHUB_OUTPUT"
        env:
          MATRIX_NODE_VERSIONS: ${{ env.matrix-node-versions }}

  setup:
    needs: [ init ]
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: pnpm
      - name: Setup
        run: |
          pnpm run setup


  build-status:
    needs: [ build ]
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Build Status
        run: echo "Building completed successfully"

  build:
    needs: [ init, setup ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: assets
          path: .assets
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Build
        run: |
          pnpm run setup
          pnpm run build


  check-status:
    needs: [ build-status ]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Check Status
        run: |
          FAILED=0
          [ "$BUILD_STATUS_RESULT" = "success" ] || FAILED=$((FAILED + 1))

          if [ "$FAILED" -ne 0 ]; then
            echo "::error ::$FAILED required jobs failed or were cancelled"
            exit 1
          fi
          echo "Checking completed successfully"
        env:
          BUILD_STATUS_RESULT: ${{ needs.build-status.result }}


  deploy-to-github-pages:
    if: github.ref == 'refs/heads/main'
    needs: [ check-status ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # Required for OIDC authentication to AWS
      pages: write # Required for GitHub Pages deployment
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: assets
          path: .assets
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: '' # 'cuz to prevent cache poisoning
          package-manager-cache: false
      - name: Build
        run: |
          pnpm run setup
          pnpm run build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v4.0.0
